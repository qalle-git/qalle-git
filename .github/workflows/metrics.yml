name: Metrics
on:
  # Regenerate daily at midnight UTC
  schedule: [{ cron: "0 0 * * *" }]
  # Allow manual runs from the Actions tab
  workflow_dispatch:
  # Refresh on every push to the default branch
  push: { branches: ["main"] }

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # A classic Personal Access Token stored as a repo secret. See SETUP.md
          token: ${{ secrets.METRICS_TOKEN }}
          user: qalle-git
          filename: github-metrics.svg
          config_timezone: Europe/Stockholm

          # Language breakdown tuned to the languages I use most
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
